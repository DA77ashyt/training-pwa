<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="训练追踪">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">

  <title>训练追踪</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">
    <!-- 页面容器 -->
    <div id="page-today" class="page active">
      <div id="today-content"></div>
    </div>
    <div id="page-train" class="page">
      <div id="train-content"></div>
    </div>
    <div id="page-history" class="page">
      <div id="history-calendar"></div>
      <div id="history-list"></div>
    </div>
    <div id="page-settings" class="page">
      <div id="settings-content"></div>
    </div>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-page="today">
        <span class="nav-icon">📋</span>
        <span>今日</span>
      </button>
      <button class="nav-item" data-page="train">
        <span class="nav-icon">💪</span>
        <span>训练</span>
      </button>
      <button class="nav-item" data-page="history">
        <span class="nav-icon">📊</span>
        <span>历史</span>
      </button>
      <button class="nav-item" data-page="settings">
        <span class="nav-icon">⚙️</span>
        <span>设置</span>
      </button>
    </nav>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- 模态弹窗 -->
    <div id="modal-overlay" class="modal-overlay">
      <div class="modal-content">
        <div id="modal-body"></div>
      </div>
    </div>

    <!-- 加载 -->
    <div id="loading-overlay" class="modal-overlay" style="display:none;align-items:center">
      <div class="loading"><div class="spinner"></div></div>
    </div>

    <!-- 组间休息倒计时 -->
    <div id="rest-timer-bar" class="rest-timer-bar">
      <div class="rest-timer-inner">
        <div class="rest-timer-header">
          <span id="rest-timer-exercise-name" class="rest-timer-ex-name"></span>
          <span class="rest-timer-label">组间休息</span>
        </div>
        <div class="rest-timer-countdown" id="rest-timer-countdown">01:00</div>
        <div class="rest-timer-track">
          <div class="rest-timer-progress" id="rest-timer-progress" style="width:100%"></div>
        </div>
        <div class="rest-timer-actions">
          <button class="rest-timer-btn" id="rest-timer-add30" onclick="addRestTime(30)">+30s</button>
          <button class="rest-timer-btn rest-timer-skip" onclick="skipRestTimer()">跳过 ›</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
  <script>
    // 注册 Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => {
          console.log('SW registration skipped:', err);
        });
      });
    }
  </script>
</body>
</html>
